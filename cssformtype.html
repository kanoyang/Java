<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style type="text/css">
      table {
        width: 400px;
        border-collapse: collapse;
      }
      td {
        border-bottom: 1px solid #888888;
        padding: 10px;
      }
      /*表格中的第一對tr;參閱虛擬選擇器*/
      tr:nth-child(1) {
        background-color: #7788aa;
        color: #ffffff;
      }
      /*tr 中的偶數對*/
      tr:nth-child(even) {
        background-color: #e8e8e8;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <td>球隊</td>
        <td>勝</td>
        <td>敗</td>
      </tr>
      <tr>
        <td>洋基</td>
        <td>9</td>
        <td>3</td>
      </tr>
      <tr>
        <td>紅襪</td>
        <td>4</td>
        <td>7</td>
      </tr>
      <tr>
        <td>藍鳥</td>
        <td>10</td>
        <td>5</td>
      </tr>
    </table>
  </body>
</html>
